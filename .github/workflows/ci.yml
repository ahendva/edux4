name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:ci
        env:
          # Dummy env vars so Firebase init doesn't crash
          EXPO_PUBLIC_FIREBASE_API_KEY: test
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test-project
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '123456'
          EXPO_PUBLIC_FIREBASE_APP_ID: 1:123456:web:abc
          EXPO_PUBLIC_PS_BASE_URL: https://ps.example.com
          EXPO_PUBLIC_PS_SCHOOL_ID: '1'

  build-functions:
    name: Build Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: npm install

      - name: Build functions
        run: npm run build
